name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: workc-macos-x64.zip
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: workc-macos-arm64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: workc-linux-x64.zip
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: workc-windows-x64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p workc-cli --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "workc-${{ matrix.target }}"
          New-Item -ItemType Directory $dir -Force
          Copy-Item "target/${{ matrix.target }}/release/workc-cli.exe" "$dir/workc.exe"
          Copy-Item scripts/install.py $dir/
          Copy-Item scripts/init.py $dir/
          Copy-Item scripts/uninstall.py $dir/
          Compress-Archive -Path $dir/* -DestinationPath ${{ matrix.asset }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          dir="workc-${{ matrix.target }}"
          mkdir -p "$dir"
          cp "target/${{ matrix.target }}/release/workc-cli" "$dir/workc"
          cp scripts/install.py scripts/init.py scripts/uninstall.py "$dir/"
          zip -j "${{ matrix.asset }}" "$dir"/*

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          echo "## workc ${{ github.ref_name }}" > body.md
          echo "" >> body.md
          echo '```' >> body.md
          echo "# 在线安装" >> body.md
          echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/install.py | python3" >> body.md
          echo "" >> body.md
          echo "# 卸载" >> body.md
          echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/uninstall.py | python3" >> body.md
          echo '```' >> body.md
      - uses: softprops/action-gh-release@v1
        with:
          body_path: body.md
          files: |
            workc-macos-x64.zip/workc-macos-x64.zip
            workc-macos-arm64.zip/workc-macos-arm64.zip
            workc-linux-x64.zip/workc-linux-x64.zip
            workc-windows-x64.zip/workc-windows-x64.zip


